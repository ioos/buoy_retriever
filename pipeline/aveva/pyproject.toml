[tool.pytest.ini_options]
pythonpath = "."

[tool.pytest_env]
AVEVA_CLIENT_ID = { value = "testing", skip_if_set = true }
AVEVA_SECRET_ID = { value = "testing", skip_if_set = true }

[tool.coverage.run]
omit = [
  ".pixi/*",
]

[tool.pixi.workspace]
channels = [ "conda-forge" ]
name = "aveva"
platforms = [ "osx-arm64", "linux-64", "linux-aarch64" ]
version = "0.1.0"

[tool.pixi.tasks]

[tool.pixi.dependencies]
ioos_qc = ">=2.2.1,<3"
pandas = ">=3.0.3,<4"
xarray = ">=2026.4.0,<2027"
pytest = "9.0.3.*"
sentry-sdk = "2.60.0.*"
httpx = "0.28.1.*"
dagster = ">=1.11.11,<2"
s3fs = ">=2025.9.0,<2026"
parse = ">=1.20.2,<2"
dagster-k8s = ">=1!0.27.11,<1!0.28"
dagster-postgres = ">=1!0.27.11,<1!0.28"
dagster-aws = ">=1!0.27.11,<1!0.28"
netcdf4 = ">=1.7.2,<2"

[tool.pixi.feature.dev.dependencies]
pytest = "*"
pytest-recording = ">=0.13.4,<0.14"
pytest-cov = "*"
moto = ">=5.1.16,<6"
pytest-env = ">=1.2.0,<2"

[tool.pixi.feature.dev.tasks]
pytest = "pytest -vv --ignore=common --record-mode=once"

[tool.pixi.environments]
dev = [ "dev" ]
